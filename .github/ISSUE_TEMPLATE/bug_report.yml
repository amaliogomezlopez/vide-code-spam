name: Bug report
description: Report a reproducible problem in Vibe Spam.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows 11, Windows 10, Linux (experimental), macOS (experimental)]
    validations:
      required: true
  - type: dropdown
    id: build
    attributes:
      label: Build
      options: [CPU portable, CPU installer, CUDA portable, CUDA installer, Source]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected behavior and exact reproduction steps.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste relevant logs after removing tokens, paths or private terminal content.
      render: shell
  - type: input
    id: cli
    attributes:
      label: External CLI and version
      placeholder: codex 1.2.3

